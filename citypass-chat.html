<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CityPass — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
:root{
  --bg:#F5F2ED;--surface:#FDFCFA;--surface2:#EFEBE4;
  --accent:#2B5F3E;--accent2:#E8A045;
  --text:#1A1A18;--text2:#6B6860;--text3:#9E9B94;
  --border:rgba(26,26,24,.10);--border2:rgba(26,26,24,.18);
  --radius:16px;--radius-sm:10px;
  --shadow:0 2px 16px rgba(26,26,24,.08);--shadow-lg:0 8px 40px rgba(26,26,24,.14);
  --font:'DM Sans',sans-serif;--font-display:'DM Serif Display',serif;
  --bubble-me:#2B5F3E;--bubble-other:#FDFCFA;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:11px;padding:12px 16px 11px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:18px;text-decoration:none;transition:background .15s;flex-shrink:0}
.back-btn:hover{background:var(--surface2)}
.driver-av{width:40px;height:40px;border-radius:50%;background:#D4EAD9;color:#1E5E30;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;position:relative}
.online-ring{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#1D9E75;border:2px solid var(--surface)}
.tb-info{flex:1;min-width:0}
.tb-name{font-size:15px;font-weight:600;color:var(--text)}
.tb-status{font-size:11px;color:#1D9E75;display:flex;align-items:center;gap:4px}
.tb-status.typing{color:var(--accent2)}
.tb-status.offline{color:var(--text3)}
.tb-actions{display:flex;gap:6px}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text2);transition:background .15s}
.icon-btn:hover{background:var(--surface2)}

/* TRIP BANNER */
.trip-banner{background:var(--accent);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;cursor:pointer}
.trip-banner:hover{opacity:.92}
.tb-route{flex:1}
.tb-route-text{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px}
.tb-route-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.tb-route-arrow{font-size:12px;color:rgba(255,255,255,.6)}
.tb-eta-box{text-align:right}
.tb-eta-val{font-size:16px;font-weight:700;color:#fff}
.tb-eta-lbl{font-size:10px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.05em}

/* MESSAGES AREA */
.messages{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* DATE SEPARATOR */
.date-sep{text-align:center;margin:10px 0;font-size:11px;color:var(--text3);font-weight:500;display:flex;align-items:center;gap:10px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* MESSAGE ROW */
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-row.me{flex-direction:row-reverse}

.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-bottom:2px}
.msg-av.driver-av-small{background:#D4EAD9;color:#1E5E30}
.msg-av.me-av{background:#2B5F3E;color:#fff}

/* BUBBLE */
.bubble-wrap{display:flex;flex-direction:column;max-width:74%;gap:2px}
.msg-row.me .bubble-wrap{align-items:flex-end}
.bubble{padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.5;position:relative;word-break:break-word}
.bubble.other{background:var(--bubble-other);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.bubble.me{background:var(--bubble-me);border-bottom-right-radius:4px;color:#fff}
.bubble.system{background:var(--surface2);color:var(--text2);font-size:12px;text-align:center;border-radius:12px;padding:7px 12px}
.msg-time{font-size:10px;color:var(--text3);padding:0 4px}
.msg-row.me .msg-time{text-align:right}

/* READ RECEIPT */
.read-check{font-size:13px;color:rgba(255,255,255,.6);margin-left:4px}
.read-check.read{color:#A8D9B8}

/* TYPING INDICATOR */
.typing-bubble{display:none;align-items:center;gap:8px;padding:4px 0}
.typing-bubble.show{display:flex}
.typing-dots{display:flex;gap:4px;background:var(--bubble-other);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;padding:12px 14px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:bounce .9s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* QUICK REPLIES */
.quick-replies{padding:6px 16px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.quick-replies::-webkit-scrollbar{display:none}
.qr-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-family:var(--font);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.qr-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* INPUT BAR */
.input-bar{padding:10px 16px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:10px;flex-shrink:0}
.input-wrap-chat{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:22px;display:flex;align-items:flex-end;padding:9px 12px 9px 14px;gap:8px;transition:border-color .15s,box-shadow .15s}
.input-wrap-chat:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(43,95,62,.10)}
.chat-input{flex:1;border:none;background:transparent;font-family:var(--font);font-size:14px;color:var(--text);outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.4}
.chat-input::placeholder{color:var(--text3)}
.emoji-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:0;line-height:1;transition:color .15s}
.emoji-btn:hover{color:var(--text2)}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px;flex-shrink:0;transition:opacity .15s,transform .1s}
.send-btn:hover{opacity:.88}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{opacity:.4;cursor:default}
.attach-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:18px;flex-shrink:0;transition:background .15s}
.attach-btn:hover{background:var(--surface2)}

/* EMOJI PICKER */
.emoji-tray{display:none;padding:10px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.emoji-tray.open{display:flex;flex-wrap:wrap;gap:6px}
.emoji-tray span{font-size:22px;cursor:pointer;padding:4px;border-radius:8px;transition:background .1s}
.emoji-tray span:hover{background:var(--surface2)}

/* MAP SHARE CARD */
.bubble.map-card{padding:0;overflow:hidden;background:var(--surface);border:1px solid var(--border);max-width:200px}
.map-card-img{width:100%;height:90px;background:linear-gradient(135deg,#c8dfc8 0%,#a8c8a8 100%);display:flex;align-items:center;justify-content:center;font-size:32px}
.map-card-body{padding:8px 10px}
.map-card-title{font-size:12px;font-weight:600;color:var(--text)}
.map-card-sub{font-size:11px;color:var(--text3)}

/* SYSTEM MSG */
.system-row{display:flex;justify-content:center;padding:4px 0}

/* UNREAD BADGE */
.scroll-down{position:absolute;bottom:180px;right:20px;z-index:10;width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;border:none;display:none;align-items:center;justify-content:center;font-size:17px;cursor:pointer;box-shadow:var(--shadow-lg)}
.scroll-down.show{display:flex}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="citypass.html"><i class="ti ti-arrow-left"></i></a>
  <div class="driver-av">MR<div class="online-ring"></div></div>
  <div class="tb-info">
    <div class="tb-name">Marco Rossetti</div>
    <div class="tb-status" id="online-status"><i class="ti ti-circle-filled" style="font-size:8px"></i> Online</div>
  </div>
  <div class="tb-actions">
    <button class="icon-btn" onclick="callDriver()" title="Chiama"><i class="ti ti-phone"></i></button>
    <button class="icon-btn" onclick="openMapView()" title="Mappa"><i class="ti ti-map-pin"></i></button>
  </div>
</div>

<!-- TRIP BANNER -->
<div class="trip-banner" onclick="openMapView()">
  <div class="tb-route">
    <div class="tb-route-text">
      <i class="ti ti-circle-filled" style="font-size:8px;color:#A8D9B8"></i>
      San Michele
      <span class="tb-route-arrow">→</span>
      Centro Verona
    </div>
    <div class="tb-route-sub">Oggi · 09:00 · Fiat Panda · 2 posti</div>
  </div>
  <div class="tb-eta-box">
    <div class="tb-eta-val" id="banner-eta">4 min</div>
    <div class="tb-eta-lbl">all'arrivo</div>
  </div>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages">
  <div class="date-sep">Oggi</div>

  <!-- system -->
  <div class="system-row">
    <div class="bubble system">🎉 Prenotazione confermata — Passaggio con Marco R.</div>
  </div>

  <!-- driver -->
  <div class="msg-row" id="msg-template-other" style="display:none">
    <div class="msg-av driver-av-small">MR</div>
    <div class="bubble-wrap">
      <div class="bubble other"></div>
      <div class="msg-time"></div>
    </div>
  </div>

  <!-- me -->
  <div class="msg-row me" id="msg-template-me" style="display:none">
    <div class="msg-av me-av">Tu</div>
    <div class="bubble-wrap">
      <div class="bubble me"></div>
      <div class="msg-time" style="text-align:right"></div>
    </div>
  </div>

</div>

<!-- TYPING -->
<div class="typing-bubble" id="typing-indicator" style="padding:0 16px 6px;display:none;align-items:center;gap:8px">
  <div class="msg-av driver-av-small" style="width:28px;height:28px;border-radius:50%;background:#D4EAD9;color:#1E5E30;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">MR</div>
  <div class="typing-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- QUICK REPLIES -->
<div class="quick-replies" id="quick-replies">
  <button class="qr-btn" onclick="sendQuick('Sono già al punto di ritrovo!')">📍 Sono già lì</button>
  <button class="qr-btn" onclick="sendQuick('Arrivo tra 2 minuti')">⏱ Arrivo in 2 min</button>
  <button class="qr-btn" onclick="sendQuick('Ok, aspetto! 👍')">👍 Ok, aspetto</button>
  <button class="qr-btn" onclick="sendQuick('Dove sei esattamente?')">🗺 Dove sei?</button>
  <button class="qr-btn" onclick="sendQuick('Grazie mille!')">🙏 Grazie</button>
</div>

<!-- EMOJI TRAY -->
<div class="emoji-tray" id="emoji-tray">
  <span onclick="addEmoji('😊')">😊</span>
  <span onclick="addEmoji('👍')">👍</span>
  <span onclick="addEmoji('🙏')">🙏</span>
  <span onclick="addEmoji('📍')">📍</span>
  <span onclick="addEmoji('🚗')">🚗</span>
  <span onclick="addEmoji('⏱')">⏱</span>
  <span onclick="addEmoji('✅')">✅</span>
  <span onclick="addEmoji('❓')">❓</span>
  <span onclick="addEmoji('👋')">👋</span>
  <span onclick="addEmoji('😅')">😅</span>
  <span onclick="addEmoji('🎉')">🎉</span>
  <span onclick="addEmoji('💶')">💶</span>
</div>

<!-- INPUT BAR -->
<div class="input-bar">
  <button class="attach-btn" onclick="shareLocation()" title="Condividi posizione"><i class="ti ti-map-pin"></i></button>
  <div class="input-wrap-chat">
    <textarea class="chat-input" id="chat-input" placeholder="Scrivi un messaggio…" rows="1"
      oninput="autoResize(this); updateSendBtn()"
      onkeydown="handleKey(event)"></textarea>
    <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
    <i class="ti ti-send"></i>
  </button>
</div>

<!-- SCROLL DOWN BTN -->
<button class="scroll-down" id="scroll-down" onclick="scrollToBottom()">
  <i class="ti ti-arrow-down"></i>
</button>

<script>
/* ── STATE ── */
const ME = { name:'Tu', initials:'Tu', role:'me' };
const DRIVER = { name:'Marco R.', initials:'MR', role:'other' };
let msgId = 0;
let typingTimer = null;
let etaMinutes = 4;

/* ── INITIAL CONVERSATION ── */
const initialMsgs = [
  { role:'other', text:'Ciao! Sono Marco, il tuo conducente per oggi 🚗', time:timeAgo(18) },
  { role:'other', text:'Partirò da San Michele alle 09:00. Ti faccio sapere quando sono in zona!', time:timeAgo(17) },
  { role:'me',    text:'Ciao Marco! Perfetto, sarò alla fermata del bus in Via Cavour', time:timeAgo(16), read:true },
  { role:'other', text:'Ottimo! Riconoscerai la mia Fiat Panda bianca. Targa VR 382 KL', time:timeAgo(14) },
  { role:'me',    text:'Ok grazie! A tra poco 👋', time:timeAgo(13), read:true },
  { role:'other', text:'Sto per partire! Sono a circa 4 minuti da te 📍', time:timeAgo(2) },
];

function timeAgo(minutesAgo) {
  const d = new Date(Date.now() - minutesAgo * 60000);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

/* ── RENDER MESSAGES ── */
function renderInitial() {
  initialMsgs.forEach(m => appendMessage(m.role, m.text, m.time, m.read || false, false));
  setTimeout(scrollToBottom, 50);
}

function appendMessage(role, text, time, read=false, animate=true) {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'me' ? ' me' : '');
  if (!animate) row.style.animation = 'none';

  if (role === 'me') {
    const readIcon = read
      ? `<span class="read-check read"><i class="ti ti-checks"></i></span>`
      : `<span class="read-check"><i class="ti ti-check"></i></span>`;
    row.innerHTML = `
      <div class="msg-av me-av">Tu</div>
      <div class="bubble-wrap">
        <div class="bubble me">${escHtml(text)}</div>
        <div class="msg-time" style="text-align:right">${time} ${readIcon}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div class="msg-av driver-av-small">MR</div>
      <div class="bubble-wrap">
        <div class="bubble other">${escHtml(text)}</div>
        <div class="msg-time">${time}</div>
      </div>`;
  }
  container.appendChild(row);
  if (isNearBottom()) scrollToBottom();
}

function appendSystem(text) {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'system-row';
  row.innerHTML = `<div class="bubble system">${text}</div>`;
  container.appendChild(row);
  if (isNearBottom()) scrollToBottom();
}

function appendLocationCard() {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row me';
  row.innerHTML = `
    <div class="msg-av me-av">Tu</div>
    <div class="bubble-wrap">
      <div class="bubble map-card" style="cursor:pointer" onclick="openMapView()">
        <div class="map-card-img">📍</div>
        <div class="map-card-body">
          <div class="map-card-title">La mia posizione</div>
          <div class="map-card-sub">Via Cavour, San Michele · ora</div>
        </div>
      </div>
      <div class="msg-time" style="text-align:right">${now()} <span class="read-check"><i class="ti ti-check"></i></span></div>
    </div>`;
  container.appendChild(row);
  if (isNearBottom()) scrollToBottom();
}

/* ── SEND ── */
function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  appendMessage('me', text, now(), false);
  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();
  hideQuickReplies();
  scrollToBottom();
  simulateReply(text);
}

function sendQuick(text) {
  appendMessage('me', text, now(), false);
  hideQuickReplies();
  scrollToBottom();
  simulateReply(text);
}

/* ── SIMULATE DRIVER REPLY ── */
const driverReplies = [
  'Arrivo tra poco! 🚗',
  'Perfetto, ti vedo dalla mappa!',
  'Ok, sto girando in Via Cavour adesso',
  'Ci siamo quasi, ancora un paio di minuti',
  '👍',
  'Sono proprio lì davanti alla fermata',
  'Segnati: panda bianca VR 382 KL',
];
let replyIdx = 0;

function simulateReply(incoming) {
  clearTimeout(typingTimer);
  const delay = 800 + Math.random() * 1200;
  setTimeout(() => showTyping(), delay * 0.4);
  typingTimer = setTimeout(() => {
    hideTyping();
    let reply = driverReplies[replyIdx % driverReplies.length];
    replyIdx++;
    // context-aware replies
    if (incoming.toLowerCase().includes('dove')) reply = 'Sono in Via Marsala, arrivo in 2 minuti!';
    if (incoming.toLowerCase().includes('grazie')) reply = 'Prego! A dopo 😊';
    if (incoming.toLowerCase().includes('lì') || incoming.toLowerCase().includes('aspetto')) reply = 'Arrivo subito, sono già in Via Cavour!';
    appendMessage('other', reply, now());
    // mark previous me msgs as read
    document.querySelectorAll('.read-check:not(.read)').forEach(el => {
      el.className = 'read-check read';
      el.innerHTML = '<i class="ti ti-checks"></i>';
    });
  }, delay);
}

/* ── TYPING INDICATOR ── */
function showTyping() {
  const t = document.getElementById('typing-indicator');
  t.style.display = 'flex';
  document.getElementById('online-status').className = 'tb-status typing';
  document.getElementById('online-status').innerHTML = '<i class="ti ti-circle-filled" style="font-size:8px"></i> Sta scrivendo…';
  if (isNearBottom()) scrollToBottom();
}
function hideTyping() {
  document.getElementById('typing-indicator').style.display = 'none';
  document.getElementById('online-status').className = 'tb-status';
  document.getElementById('online-status').innerHTML = '<i class="ti ti-circle-filled" style="font-size:8px"></i> Online';
}

/* ── QUICK REPLIES ── */
function hideQuickReplies() {
  document.getElementById('quick-replies').style.display = 'none';
}

/* ── EMOJI ── */
function toggleEmoji() {
  const tray = document.getElementById('emoji-tray');
  tray.classList.toggle('open');
}
function addEmoji(e) {
  const inp = document.getElementById('chat-input');
  inp.value += e;
  inp.focus();
  updateSendBtn();
  document.getElementById('emoji-tray').classList.remove('open');
}

/* ── TEXTAREA AUTO RESIZE ── */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

/* ── SEND BTN ── */
function updateSendBtn() {
  const val = document.getElementById('chat-input').value.trim();
  document.getElementById('send-btn').disabled = !val;
}

/* ── SCROLL ── */
function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTo({ top:m.scrollHeight, behavior:'smooth' });
}
function isNearBottom() {
  const m = document.getElementById('messages');
  return m.scrollHeight - m.scrollTop - m.clientHeight < 100;
}
document.getElementById('messages').addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-down');
  btn.className = 'scroll-down' + (isNearBottom() ? '' : ' show');
});

/* ── LOCATION SHARE ── */
function shareLocation() {
  appendLocationCard();
  hideQuickReplies();
  simulateReply('posizione condivisa');
}

/* ── ETA COUNTDOWN ── */
setInterval(() => {
  if (etaMinutes > 0) {
    etaMinutes = Math.max(0, etaMinutes - 1);
    document.getElementById('banner-eta').textContent = etaMinutes > 0 ? etaMinutes + ' min' : 'Arrivato!';
    if (etaMinutes === 1) appendSystem('🚗 Marco è a meno di 1 minuto da te!');
    if (etaMinutes === 0) appendSystem('✅ Il conducente è arrivato al punto di ritrovo!');
  }
}, 60000);

/* ── NAV ── */
function callDriver() {
  appendSystem('📞 Chiamata a Marco Rossetti…');
  scrollToBottom();
}
function openMapView() {
  window.location.href = 'citypass-mappa.html';
}

/* ── UTIL ── */
function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

/* ── INIT ── */
renderInitial();
</script>
</body>
